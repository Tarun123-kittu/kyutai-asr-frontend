<!DOCTYPE html>
<html>
  <head>
    <title>Kyutai Live STT</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      button {
        padding: 10px 20px;
        margin: 5px;
        font-size: 16px;
      }
      #status {
        padding: 15px;
        margin: 10px 0;
        border: 1px solid #ccc;
        min-height: 20px;
        font-weight: bold;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <h1>Kyutai Live Speech-to-Text</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <div id="status">Ready</div>

    <h3>Live Transcription:</h3>
    <div
      id="transcription"
      style="
        min-height: 50px;
        border: 1px solid #ccc;
        padding: 10px;
        margin: 10px 0;
      "
    ></div>

    <h3>Logs:</h3>
    <!-- Logs will be added here by JavaScript -->

    <script src="script.js"></script>
  </body>
</html>
